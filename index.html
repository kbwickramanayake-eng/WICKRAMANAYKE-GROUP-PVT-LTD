<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wickramanayake Group - Login</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col font-body">

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="flex-grow flex flex-col w-full h-screen overflow-hidden relative">
        <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-brand-400/20 blur-[100px]">
            </div>
            <div
                class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-emerald-400/20 blur-[100px]">
            </div>
        </div>

        <div class="flex items-center justify-center min-h-screen w-full px-4 relative z-10">
            <div
                class="w-full max-w-md bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-white/40">
                <div class="text-center mb-8">
                    <img src="logo.png" alt="Logo" class="h-24 mx-auto mb-4 object-contain rounded-xl"
                        onerror="this.src='https://via.placeholder.com/150?text=Logo'">
                    <h1 class="text-3xl font-bold font-sans text-green-900">Welcome Back</h1>
                    <p class="text-gray-500 mt-2 text-sm">Sign in as Admin or Ref</p>
                </div>

                <form id="login-form" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-gray-700 ml-1">Admin or Ref Access Code</label>
                        <div class="relative group">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                <i class="fa-solid fa-lock"></i>
                            </div>
                            <input type="password" id="login-code" required placeholder="Enter Admin or Ref code..."
                                class="w-full pl-11 pr-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 px-4 rounded-2xl shadow-lg shadow-green-500/30 flex items-center justify-center gap-2">
                        <span>Authenticate</span>
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                    <p class="text-xs text-gray-400 font-medium uppercase">Wickramanayake Group © <span
                            id="current-year"></span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="login.js"></script>
</body>

</html>
